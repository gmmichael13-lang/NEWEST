<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="background:black; color:white; font-family:sans-serif;">

<div id="latest-members">Loading warriors...</div>

<script>
async function load() {
  try {
    const res = await fetch("https://api.chess.com/pub/club/chess-on-earth-2/members");
    const data = await res.json();

    let members = [
      ...(data.weekly || []),
      ...(data.monthly || []),
      ...(data.all_time || [])
    ];

    members = members.sort((a,b)=>b.joined-a.joined).slice(0,10);

    document.getElementById("latest-members").innerHTML =
      members.map(m => `
        <div>${m.username}</div>
      `).join("");

  } catch(e) {
    document.getElementById("latest-members").innerText = "Failed to load";
  }
}

load();
</script>

</body>
</html>
